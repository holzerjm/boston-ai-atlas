name: Validate atlas data

on:
  pull_request:
    paths: ["data.js", "scripts/**"]
  push:
    branches: [main]
    paths: ["data.js", "scripts/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate data.js
        run: node scripts/validate.js
